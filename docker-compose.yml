services:
  # --------------------------------------------------------------------------
  # Flask backend
  # Redis is hosted externally – configure it via .env (REDIS_HOST etc.)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./b-ai-tutor/server
      dockerfile: Dockerfile
    restart: unless-stopped
    # All secrets / Redis connection details come from the backend .env file
    env_file: ./b-ai-tutor/server/.env
    environment:
      # Tell Flask to trust X-Forwarded-For set by Caddy
      TRUST_PROXY: "1"
      PORT: "7700"
    volumes:
      # Persist FAISS indexes across container restarts
      - faiss_data:/app/faiss_store
    ports:
      # Exposed on 7700 – host Caddy proxies api-tutorai.aditya-raj.site → localhost:7700
      - "7700:7700"

  # --------------------------------------------------------------------------
  # Docker Caddy – serves React SPA on plain HTTP :80 (host port 3000)
  # Host Caddy proxies tutorai.aditya-raj.site → localhost:3000 (with TLS)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./f-ai-tutor
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: "https://api-tutorai.aditya-raj.site"
    restart: unless-stopped
    ports:
      # Exposed on 3000 – host Caddy proxies tutorai.aditya-raj.site → localhost:3000
      - "3000:80"
    depends_on:
      - backend

volumes:
  faiss_data:
