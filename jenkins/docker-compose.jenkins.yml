# AI-Tutor Jenkins stack
# Serves at https://ai-jenkins.aditya-raj.site via Caddy (auto-TLS)
#
# Usage:
#   cp jenkins/.env.example jenkins/.env   # set JENKINS_ADMIN_PASSWORD
#   docker compose -f jenkins/docker-compose.jenkins.yml up -d --build

services:
  jenkins:
    build:
      context: . # uses jenkins/Dockerfile
      dockerfile: Dockerfile
    container_name: ai-tutor-jenkins
    restart: unless-stopped
    # Port 8080 is intentionally NOT exposed to the host –
    # Caddy is the only entry-point (handles TLS termination).
    expose:
      - "8080"
    ports:
      - "50000:50000" # JNLP agent port for external build agents
    volumes:
      # Persist Jenkins home (jobs, credentials, plugins, config)
      - jenkins_home:/var/jenkins_home
      # Mount JCasC config so it is picked up on every restart
      - ./casc:/var/jenkins_home/casc:ro
      # Share host Docker socket so Jenkins can run docker build / docker push
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env # provides JENKINS_ADMIN_PASSWORD
    environment:
      # Skip setup wizard; point JCasC at the mounted config directory
      JAVA_OPTS: >-
        -Djenkins.install.runSetupWizard=false
        -Dcasc.jenkins.config=/var/jenkins_home/casc
    networks:
      - jenkins_net

  caddy:
    image: caddy:2-alpine
    container_name: ai-tutor-jenkins-caddy
    restart: unless-stopped
    ports:
      - "80:80" # HTTP → redirected to HTTPS by Caddy
      - "443:443" # HTTPS (auto-TLS via Let's Encrypt)
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # persists TLS certificates
      - caddy_config:/config
    depends_on:
      - jenkins
    networks:
      - jenkins_net

volumes:
  jenkins_home:
  caddy_data:
  caddy_config:

networks:
  jenkins_net:
