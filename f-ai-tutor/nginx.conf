server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ------------------------------------------------------------------
    # API proxy – forward all backend routes to the Flask container
    # ------------------------------------------------------------------
    location ~ ^/(upload|session) {
        proxy_pass         http://backend:7700;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow PDF uploads up to 10 MB
        client_max_body_size 10m;

        # Avoid gateway timeouts on large PDF processing
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ------------------------------------------------------------------
    # SPA fallback – every unknown path returns index.html
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
